name: Car News Tracker

on:
  schedule:
    # 매일 오전 9:30 KST (= 0:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tracker
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C0AK9JXU6N8
        run: python tracker.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add states/
          git diff --cached --quiet || git commit -m "Update tracker state [skip ci]"
          git pull --rebase
          git push
